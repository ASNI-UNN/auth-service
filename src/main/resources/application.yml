spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5441/auth_db}
    username: ${DB_USERNAME:auth}
    password: ${DB_PASSWORD:auth}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}
      password: ${REDIS_PASSWORD:}

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:changeme-replace-in-production-256bit-secret-key!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

admin:
  default:
    username: ${ADMIN_DEFAULT_USERNAME:admin}
    password: ${ADMIN_DEFAULT_PASSWORD:Admin@1234!}
    email: ${ADMIN_DEFAULT_EMAIL:admin@asni.local}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
